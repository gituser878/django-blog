<!DOCTYPE html>
<html lang='en' id='html-root'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>{% block title %}MyBlog{% endblock %}</title>
  <script src='https://cdn.tailwindcss.com'></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'DM Mono', monospace; }
  </style>
</head>
<body class='bg-gray-50 dark:bg-[#0a1628] text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-300'>

<!-- NAVBAR -->
<nav class='border-b border-gray-200 dark:border-white/[0.07] bg-white dark:bg-[#111e33] px-6 py-3 flex items-center justify-between'>
  <a href='{% url "blog-home" %}' class='mono text-sm tracking-widest uppercase text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-colors'>myblog</a>
  <div class='flex items-center gap-1 text-sm'>
    <a href='{% url "blog-home" %}' class='px-3 py-1.5 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/[0.07] hover:text-gray-800 dark:hover:text-gray-100 transition-all'>Home</a>
    {% if user.is_authenticated %}
      <a href='{% url "post-create" %}' class='px-3 py-1.5 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/[0.07] hover:text-gray-800 dark:hover:text-gray-100 transition-all'>New Post</a>
      <a href='{% url "profile" %}' class='px-3 py-1.5 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/[0.07] hover:text-gray-800 dark:hover:text-gray-100 transition-all'>Profile</a>
      <form method="POST" action="{% url 'logout' %}" class="inline">
        {% csrf_token %}
        <button type="submit" class='px-3 py-1.5 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/[0.07] hover:text-gray-800 dark:hover:text-gray-100 transition-all cursor-pointer bg-transparent border-none text-sm'>
          Logout
        </button>
      </form>
    {% else %}
      <a href='{% url "register" %}' class='px-3 py-1.5 rounded-md text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/[0.07] hover:text-gray-800 dark:hover:text-gray-100 transition-all'>Register</a>
      <a href='{% url "login" %}' class='px-3 py-1.5 rounded-md text-[#4f8ef7] border border-[#4f8ef7]/30 hover:bg-[#4f8ef7]/10 transition-all'>Login</a>
    {% endif %}
    <button onclick='toggleDark()' class='ml-2 mono text-xs px-3 py-1.5 rounded-md border border-gray-200 dark:border-white/[0.07] text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 transition-all'>
      <span class='dark:hidden'>Dark</span>
      <span class='hidden dark:inline'>Light</span>
    </button>
  </div>
</nav>

<!-- FLASH MESSAGES -->
<div class='max-w-4xl mx-auto mt-4 px-4'>
  {% for message in messages %}
    <div class='border rounded-md px-4 py-2 mb-2 text-sm
      {% if message.tags == "error" %}
        border-red-300 bg-red-50 dark:bg-red-900/20 dark:border-red-700/40 text-red-700 dark:text-red-300
      {% else %}
        border-green-300 bg-green-50 dark:bg-green-900/20 dark:border-green-700/40 text-green-700 dark:text-green-300
      {% endif %}'>
      {{ message }}
    </div>
  {% endfor %}
</div>

<!-- MAIN CONTENT -->
<main class='max-w-4xl mx-auto px-4 py-8'>
  {% block content %}{% endblock %}
</main>

<script>
  function toggleDark() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('dark', document.documentElement.classList.contains('dark'));
  }
  if (localStorage.getItem('dark') === 'true') {
    document.documentElement.classList.add('dark');
  }
</script>
</body>
</html>
